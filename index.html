<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chino Master - Modo Copy</title>
    <style>
        :root { 
            --primary: #3498db; 
            --success: #2ecc71; 
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #e0e0e0;
            --border: #333333;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .app-container { 
            width: 95%; 
            max-width: 1000px;
            padding: 20px; 
            text-align: center; 
        }
        
        .view { display: none; }
        .view.active { display: block; }

        /* Grillas y Menú */
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; 
            margin-top: 20px; 
            margin-bottom: 30px;
        }
        .grid-unidades { 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
        }
        @media (max-width: 800px) {
            .grid-unidades { grid-template-columns: 1fr 1fr; }
            .app-container { max-width: 700px; }
        }

        .deck-card { 
            background: var(--surface); 
            padding: 20px 10px;
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid var(--border);
        }
        .deck-card:hover { 
            border-color: var(--primary); 
            background: #252525;
        }

        .unit-group {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .section-title {
            text-align: left;
            margin: 30px 0 15px 0;
            color: var(--text);
            font-size: 1.2rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 5px;
        }

        /* Juego */
        .game-card { 
            background: var(--surface); 
            padding: 40px 20px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-top: 20px; 
            border: 1px solid var(--border);
        }

        h1 { font-size: 5rem; margin: 10px 0; color: #fff; }
        #pinyin { 
            font-size: 1.5rem; 
            color: var(--primary); 
            height: 2rem; 
            margin-bottom: 15px;
            visibility: hidden; 
            font-weight: bold;
        }
        #pinyin.show { visibility: visible; }

        input { 
            width: 100%; 
            padding: 15px; 
            font-size: 1.8rem; 
            background: #2c2c2c;
            color: white;
            border: 3px solid var(--border); 
            border-radius: 15px; 
            text-align: center; 
            outline: none; 
            box-sizing: border-box; 
        }
        input:focus { border-color: var(--primary); }
        input.correct { border-color: var(--success); background: #1b3d2a; }

        .btn-pista {
            margin-top: 20px;
            background: #333;
            border: 1px solid var(--border);
            color: #ccc;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .btn-pista:active { background: var(--primary); color: white; }

        .btn-back { margin-top: 20px; background: none; border: none; color: var(--primary); cursor: pointer; font-weight: bold; }

        /* Diccionario y Modales */
        #dict-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer; z-index: 1000; }
        #dict-panel { position: fixed; bottom: 100px; right: 30px; width: 320px; background: var(--surface); border-radius: 20px; display: none; flex-direction: column; z-index: 1000; max-height: 70vh; border: 1px solid var(--border); overflow: hidden; }
        #dict-panel.open { display: flex; }
        .dict-header { background: #252525; padding: 15px; display: flex; justify-content: space-between; font-weight: bold; }
        
        #modal-limite, #modal-fin { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1500; }
        .modal-content { background: var(--surface); padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid var(--border); }
        .btn-action { padding: 12px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; background: #2c2c2c; color: var(--text); font-weight: bold; margin: 5px; }
        /* Animación de acierto */
        #success-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(46, 204, 113, 0.2); /* Verde éxito suave */
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 25px;
            z-index: 10;
            pointer-events: none; /* Para que no bloquee clics */
            border: 4px solid var(--success);
        }

        #success-overlay span {
            background: var(--success);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Necesitamos que la tarjeta sea relativa para que el overlay se pegue a ella */
        .game-card { position: relative; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="view-menu" class="view active">
        <h2 class="section-title">Ruta de Aprendizaje</h2>
        <div class="menu-grid grid-unidades">
            <div class="deck-card" onclick="empezarJuego('unidad1.json')"><h3>Unidad 1</h3></div>
            <div class="deck-card" onclick="empezarJuego('unidad2.json')"><h3>Unidad 2</h3></div>
            <div class="deck-card" onclick="empezarJuego('unidad3.json')"><h3>Unidad 3</h3></div>
            <div class="deck-card" onclick="empezarJuego('unidad4.json')"><h3>Unidad 4</h3></div>
        </div>

        <h2 class="section-title">Estudio por Niveles</h2>
        <div class="unit-group">
            <div class="menu-grid">
                <div class="deck-card" onclick="empezarJuego('parte1_u1.json')"><h3>U1 - Principiante</h3></div>
                <div class="deck-card" onclick="empezarJuego('parte2_u1.json')"><h3>U1 - Intermedio</h3></div>
            </div>
        </div>
    </div>

    <div id="view-game" class="view">
        <button class="btn-back" onclick="irAlMenu()">← Volver al menú</button>
        <div id="game-status" style="margin-top:10px; color:#666; font-size:0.8rem;"></div>
        <div class="game-card">
            <div id="success-overlay"><span>¡Correcto! ✓</span></div>
            <h1 id="objetivo">---</h1>
            <div id="pinyin">---</div>
            <input type="text" id="input" placeholder="Escribe el carácter..." autocomplete="off" spellcheck="false">
            <br>
            <button class="btn-pista" onclick="togglePinyin()">💡 Ver Pinyin</button>
        </div>
    </div>

    <div id="modal-limite">
        <div class="modal-content">
            <h3 id="titulo-mazo-modal">Mazo</h3>
            <p>¿Cuántas tarjetas quieres?</p>
            <div class="btn-grid-cant">
                <button class="btn-action" onclick="prepararMazo(5)">5</button>
                <button class="btn-action" onclick="prepararMazo(15)">15</button>
                <button class="btn-action" onclick="prepararMazo(0)">Todo</button>
            </div>
            <button onclick="cerrarModales()" style="margin-top:20px; border:none; background:none; color:#666;">Cancelar</button>
        </div>
    </div>

    <div id="modal-fin">
        <div class="modal-content">
            <h2>¡Listo! 🎉</h2>
            <button class="btn-action" onclick="reiniciarSesion()" style="background:var(--primary); color:white; border:none; width:100%;">Repetir</button>
            <button class="btn-action" onclick="irAlMenu()" style="width:100%;">Menú</button>
        </div>
    </div>
</div>

<button id="dict-btn" onclick="toggleDict()">📖</button>
<div id="dict-panel">
    <div class="dict-header"><span>Diccionario</span><button onclick="toggleDict()" style="color:white; background:none; border:none;">×</button></div>
    <div class="dict-body">
        <input type="text" id="dict-input" placeholder="Buscar..." oninput="buscar()">
        <div id="dict-res"></div>
    </div>
</div>

<script>
    let frases = [], frasesCompletas = [], diccionario = [], idx = 0, ultimoTamano = 0;
    const domInp = document.getElementById('input');

    async function cargarDiccionario() {
        try { const res = await fetch('data/diccionario.json'); diccionario = await res.json(); } catch(e){}
    }
    cargarDiccionario();

    async function empezarJuego(archivo) {
        try {
            const res = await fetch(`data/${archivo}`);
            frasesCompletas = await res.json();
            document.getElementById('titulo-mazo-modal').innerText = archivo.split('.')[0].toUpperCase();
            document.getElementById('modal-limite').style.display = 'flex';
        } catch (e) { alert("Error cargando: data/" + archivo); }
    }

    function prepararMazo(cant) {
        ultimoTamano = cant;
        let temp = [...frasesCompletas];
        temp.sort(() => Math.random() - 0.5);
        frases = cant > 0 ? temp.slice(0, cant) : temp;
        cerrarModales();
        idx = 0;
        document.getElementById('view-menu').classList.remove('active');
        document.getElementById('view-game').classList.add('active');
        cargarFrase();
    }

    function cargarFrase() {
        document.getElementById('objetivo').innerText = frases[idx].h;
        document.getElementById('pinyin').innerText = frases[idx].p;
        document.getElementById('pinyin').classList.remove('show');
        document.getElementById('game-status').innerText = `Tarjeta ${idx + 1} de ${frases.length}`;
        domInp.value = "";
        domInp.classList.remove('correct');
        setTimeout(() => domInp.focus(), 300);
    }

    function togglePinyin() {
        document.getElementById('pinyin').classList.toggle('show');
        domInp.focus(); // Mantiene el teclado abierto en móviles
    }

domInp.addEventListener('input', () => {
    if (domInp.value.trim() === frases[idx].h) {
        // 1. Mostrar feedback visual inmediato
        domInp.classList.add('correct');
        const overlay = document.getElementById('success-overlay');
        overlay.style.display = 'flex';
        
        // 2. Esperar un poco antes de cambiar (600ms es el punto dulce)
        setTimeout(() => {
            overlay.style.display = 'none'; // Ocultar overlay
            idx++;
            
            if (idx >= frases.length) {
                document.getElementById('modal-fin').style.display = 'flex';
            } else {
                cargarFrase();
            }
        }, 850); 
    }
});

    function irAlMenu() { cerrarModales(); document.getElementById('view-game').classList.remove('active'); document.getElementById('view-menu').classList.add('active'); }
    function cerrarModales() { document.getElementById('modal-limite').style.display = 'none'; document.getElementById('modal-fin').style.display = 'none'; }
    function reiniciarSesion() { prepararMazo(ultimoTamano); }
    function toggleDict() { document.getElementById('dict-panel').classList.toggle('open'); }
    
    function buscar() {
        const q = document.getElementById('dict-input').value.toLowerCase();
        const resDiv = document.getElementById('dict-res');
        resDiv.innerHTML = "";
        if(!q) return;
        diccionario.filter(i => i.h.includes(q) || i.p.toLowerCase().includes(q) || (i.s && i.s.toLowerCase().includes(q)))
                   .forEach(i => resDiv.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333"><b>${i.h}</b> (${i.p})<br>${i.s || ''}</div>`);
    }

    // Soporte para Espacio en PC
    window.addEventListener('keydown', (e) => {
        if (e.code === "Space" && document.getElementById('view-game').classList.contains('active')) {
            if (document.activeElement !== domInp) {
                e.preventDefault();
                togglePinyin();
            }
        }
    });
</script>
</body>
</html>
